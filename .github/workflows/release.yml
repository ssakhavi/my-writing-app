name: Release

# Builds a packaged app artifact when a version tag is pushed.
# macOS only for now, per the PRD's build-scope decision; extend the matrix
# to Windows/Linux once Phase 3 packaging work lands.
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-macos:
    name: build (macos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Typora Clone ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
